root = "."
tmp_dir = "tmp"

[build]
    cmd = "make build-api"
    env_files = [".env"]
    entrypoint = ["bash", "scripts/run_dlv.sh", "api"]
    include_ext = ["go", "toml", "tpl", "tmpl", "html", "css", "js", "wasm"]
    exclude_dir = ["tmp", "bin", "vendor", "internal/spinner", "cmd/spinner"]
    delay = 500
    stop_on_error = true
    send_interrupt = true

[log]
    level = "debug"
    time = true

[color]
    main = "magenta"
    watcher = "cyan"
    build = "yellow"
    runner = "green"

[misc]
    clean_on_exit = true

[screen]
    clear_on_rebuild = true
