info:
  name: Handle HTTP request for retrieving list of movies from Google Sheets (specified by local spreadsheetID).
  type: http
  seq: 1
  tags:
    - movies

http:
  method: GET
  url: "{{baseUrl}}/sheets/movies"
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:8080

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/sheets/movies"
      method: GET
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: example
    request:
      url: "{{baseUrl}}/sheets/movies"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Sat, 18 Apr 2026 14:36:21 GMT
