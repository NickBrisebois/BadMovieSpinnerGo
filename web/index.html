<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Bad Movie Spinner</title>
    </head>
    <body>
        <header>
            <h1>Bad friggin movies</h1>
            <p>yeah</p>
        </header>

        <div id="spinner-container"></div>

        <script>
            window.appConfig = {
                SERVER_HOST: "badmovies.api.acid1.xyz",
                SERVER_PORT: "443",
            };
        </script>
        <script src="static/wasm_exec.js"></script>
        <script>
            const go = new Go();
            WebAssembly.instantiateStreaming(fetch("static/main.wasm"), go.importObject).then((result) => {
                go.run(result.instance);
            });
        </script>
    </body>
</html>
